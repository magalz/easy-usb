name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Set platform excludes
        id: ex
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            echo "flags=--exclude easy-usb-adapter-vci" >> $GITHUB_OUTPUT
          else
            echo "flags=--exclude easy-usb-adapter-linux" >> $GITHUB_OUTPUT
          fi

      - name: Clippy
        run: cargo clippy --workspace ${{ steps.ex.outputs.flags }} -- -D warnings -W clippy::disallowed_methods

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Set platform excludes
        id: ex
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            echo "flags=--exclude easy-usb-adapter-vci" >> $GITHUB_OUTPUT
          else
            echo "flags=--exclude easy-usb-adapter-linux" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        run: cargo test --workspace ${{ steps.ex.outputs.flags }}

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: License and advisory audit
        run: cargo deny check --config .github/cargo-deny.toml advisories licenses

  interop:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Docker Compose
        run: docker compose -f docker/docker-compose.yml up --build -d

      - name: Run interop tests
        run: USBIP_DOCKER_INTEROP=1 cargo test -p easy-usb-core --test interop -- --ignored
        env:
          RUST_LOG: info

      - name: Tear down Docker
        if: always()
        run: docker compose -f docker/docker-compose.yml down -t 5

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install --locked cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --exclude easy-usb-adapter-vci --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
